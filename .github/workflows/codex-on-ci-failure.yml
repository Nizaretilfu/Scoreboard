name: Codex - Fix CI Failures

on:
  workflow_run:
    workflows:
      - Build, Test and Coverage
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

concurrency:
  group: codex-ci-fix-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  codex-fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      vars.CODEX_TRUSTED_ACTORS != '' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.pull_requests[0].number != null &&
      github.event.workflow_run.pull_requests[0].user.login != 'github-actions[bot]' &&
      contains(format(',{0},', vars.CODEX_TRUSTED_ACTORS), format(',{0},', github.event.workflow_run.pull_requests[0].user.login)) &&
      secrets.OPENAI_API_KEY != ''
    runs-on: ubuntu-latest

    steps:
      - name: Debug trusted actor gate inputs
        run: |
          echo "workflow_run.actor=${{ github.event.workflow_run.actor.login }}"
          echo "pr_author=${{ github.event.workflow_run.pull_requests[0].user.login }}"
          echo "head_repo=${{ github.event.workflow_run.head_repository.full_name }}"
          echo "base_repo=${{ github.repository }}"

      - name: Check out failed branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Run Codex CI remediation
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prompt-file: .github/codex/prompts/fix-ci-failure.md
