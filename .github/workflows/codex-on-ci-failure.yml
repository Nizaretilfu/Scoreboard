name: Codex - Fix CI Failures

on:
  workflow_run:
    workflows:
      - Build, Test and Coverage
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

concurrency:
  group: codex-ci-fix-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  codex-fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.repository.full_name == github.repository &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      contains(format(',{0},', vars.CODEX_TRUSTED_ACTORS), format(',{0},', github.event.workflow_run.actor.login)) &&
      secrets.OPENAI_API_KEY != ''
    runs-on: ubuntu-latest

    steps:
      - name: Run Codex on failed CI
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prompt-file: .github/codex/prompts/fix-ci-failure.md
