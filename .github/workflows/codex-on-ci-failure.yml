name: Codex - Fix CI Failures

on:
  workflow_run:
    workflows:
      - Build, Test and Coverage
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

concurrency:
  group: codex-ci-fix-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  codex-fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Debug workflow_run context
        run: |
          echo "workflow_run.id=${{ github.event.workflow_run.id }}"
          echo "workflow_run.name=${{ github.event.workflow_run.name }}"
          echo "workflow_run.event=${{ github.event.workflow_run.event }}"
          echo "workflow_run.conclusion=${{ github.event.workflow_run.conclusion }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          echo "workflow_run.repository.full_name=${{ github.event.workflow_run.repository.full_name }}"

      - name: Check out failed workflow state
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Run Codex on failed CI
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            CI failed for a pull request.

            Read PROJECT.md, ARCHITECTURE.md, and AGENTS.md first.

            Inspect the repository and the failed workflow context.
            Identify the smallest possible fix needed to make CI pass.
            Keep the PR scope unchanged.
            Do not change unrelated code.
            After making the fix, stop.