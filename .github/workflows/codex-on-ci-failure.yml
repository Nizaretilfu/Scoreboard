name: Codex - Fix CI Failures

on:
  workflow_run:
    workflows:
      - Build, Test and Coverage
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

concurrency:
  group: codex-ci-fix-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  codex-fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      vars.CODEX_TRUSTED_ACTORS != '' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.actor.login != 'github-actions[bot]' &&
      contains(format(',{0},', vars.CODEX_TRUSTED_ACTORS), format(',{0},', github.event.workflow_run.actor.login))
    runs-on: ubuntu-latest

    steps:
      - name: Preflight OPENAI_API_KEY check
        id: preflight
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::Skipping Codex remediation because OPENAI_API_KEY is not configured."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Debug trusted actor gate inputs
        if: steps.preflight.outputs.ready == 'true'
        run: |
          echo "workflow_run.actor=${{ github.event.workflow_run.actor.login }}"
          echo "head_repo=${{ github.event.workflow_run.head_repository.full_name }}"
          echo "base_repo=${{ github.repository }}"

      - name: Check out failed branch
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Run Codex CI remediation
        if: steps.preflight.outputs.ready == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prompt-file: .github/codex/prompts/fix-ci-failure.md
