name: Codex - Address PR Review Feedback

on:
  pull_request_review_comment:
    types:
      - created
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-review-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review-fix:
    if: >-
      vars.CODEX_TRUSTED_ACTORS != '' &&
      github.event.pull_request.head.repo.fork == false &&
      github.actor != 'github-actions[bot]' &&
      contains(format(',{0},', vars.CODEX_TRUSTED_ACTORS), format(',{0},', github.actor)) &&
      (
        github.event_name == 'pull_request_review_comment' ||
        (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Preflight OPENAI_API_KEY check
        id: preflight
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::Skipping Codex review remediation because OPENAI_API_KEY is not configured."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Check out PR branch
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Rebase branch on latest remote state
        if: steps.preflight.outputs.ready == 'true'
        run: |
          git fetch origin "${{ github.event.pull_request.head.ref }}"
          git checkout "${{ github.event.pull_request.head.ref }}"
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}"

      - name: Run Codex for review feedback
        if: steps.preflight.outputs.ready == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prompt-file: .github/codex/prompts/address-pr-review.md
